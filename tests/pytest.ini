[pytest]
markers =
    jwt: Tests die JWT Login benötigen (login/refresh/logout schreiben in Auth-DB)
    slow: Langsame Tests (rate-limit sleeps, Advisory Lock, Publish)
    write: Tests die Daten schreiben (Enclosure, Species, Media, Feedback anlegen)
    media: Tests für Media Upload/Download
    feedback: Feedback-System Tests — nicht automatisch gegen Live-Server
    security: Security-Tests inkl. POST-Negativtests gegen Auth-Endpunkte (im Safe-Smoke enthalten, dokumentierter Trade-off)
    requires_data: Tests die echte Zoo-/SQLite-/Feed-Daten benötigen
    feed: RSS-Feed Tests

testpaths = .
