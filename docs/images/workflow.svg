<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">Publishing Workflow</title>
  <desc id="desc">From physical zoo information to open, reusable biodiversity data</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box2 { fill: #eef6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .box3 { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 18; }
      .box4 { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
      .pill { fill: #e2e8f0; rx: 12; }
      .pilltext { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="850"/>
  <text class="title" x="60" y="70">Publishing Workflow</text>
  <text class="subtitle" x="60" y="108">From physical zoo information to open, reusable biodiversity data</text>
  <rect class="box2" x="70" y="240" width="220" height="140" rx="18"/>
<text class="label" x="94" y="282">📷</text>
<text class="label" x="138" y="284">OCR / Admin Entry</text>
<text class="small" x="94" y="318">Species is added or edited</text>
<rect class="box2" x="325" y="240" width="220" height="140" rx="18"/>
<text class="label" x="349" y="282">📚</text>
<text class="label" x="393" y="284">Wikidata Lookup</text>
<text class="small" x="349" y="318">Q-ID, labels, taxonomy</text>
<rect class="box3" x="580" y="240" width="220" height="140" rx="18"/>
<text class="label" x="604" y="282">🧬</text>
<text class="label" x="648" y="284">GBIF Resolution</text>
<text class="small" x="604" y="318">Backbone taxon key</text>
<rect class="box4" x="835" y="240" width="220" height="140" rx="18"/>
<text class="label" x="859" y="282">🗄️</text>
<text class="label" x="903" y="284">Store Record</text>
<text class="small" x="859" y="318">PostgreSQL source data</text>
<rect class="box4" x="1090" y="240" width="220" height="140" rx="18"/>
<text class="label" x="1114" y="282">📤</text>
<text class="label" x="1158" y="284">Publish</text>
<text class="small" x="1114" y="318">REST · RSS · SQLite</text>
<path class="arrow" d="M290 310 L325 310"/><path class="arrow" d="M545 310 L580 310"/><path class="arrow" d="M800 310 L835 310"/><path class="arrow" d="M1055 310 L1090 310"/><rect class="box" x="245" y="525" width="320" height="120" rx="18"/>
<text class="label" x="269" y="567">🔗</text>
<text class="label" x="313" y="569">Linked Biodiversity Data</text>
<text class="small" x="269" y="603">Wikidata and GBIF identifiers make records reusable</text>
<rect class="box" x="820" y="525" width="320" height="120" rx="18"/>
<text class="label" x="844" y="567">💾</text>
<text class="label" x="888" y="569">Offline Visitor Data</text>
<text class="small" x="844" y="603">SQLite bundles make zoo data usable without connectivity</text>
<path class="dashed" d="M690 380 L405 525"/><path class="dashed" d="M945 380 L980 525"/>
</svg>