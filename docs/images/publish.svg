<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">Publishing and Export Flow</title>
  <desc id="desc">One source dataset can be distributed through REST, RSS, SQLite and media endpoints</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box2 { fill: #eef6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .box3 { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 18; }
      .box4 { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
