name: openZooData Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  static:
    name: Syntax and test collection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tests/requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-dev.txt

      - name: Python syntax check
        run: |
          python -m py_compile source/app.py source/routes/*.py source/helpers/*.py
          python -m py_compile tests/*.py

      - name: Pytest collection check
        run: pytest tests/ --collect-only -q

      - name: Safe-Smoke-Collect (zeigt welche Tests automatisch laufen würden)
        run: |
          echo "=== Safe-Smoke-Tests ==="
          pytest tests/ --collect-only -q \
            -m "not slow and not write and not feedback and not requires_data and not media and not jwt"
          echo "=== Ende Safe-Smoke-Tests ===" 

  api-smoke:
    name: API smoke tests against deployed server
    # Nur manuell auslösen (workflow_dispatch) — verhindert Race Condition
    # zwischen GitHub Push und Server-Deploy (git pull läuft separat).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tests/requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-dev.txt

      - name: Create tests/.env from secrets
        run: |
          if [ -z "${{ secrets.TEST_BASE_URL }}" ]; then
            echo "TEST_BASE_URL nicht gesetzt — Live-Tests werden übersprungen."
            echo "BASE_URL=http://127.0.0.1:5001" > tests/.env
          else
            {
              echo "BASE_URL=${{ secrets.TEST_BASE_URL }}"
              echo "TEST_APP_TOKEN=${{ secrets.TEST_APP_TOKEN }}"
              echo "TEST_EMAIL=${{ secrets.TEST_EMAIL }}"
              echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}"
              echo "TEST_ZOO=${{ secrets.TEST_ZOO }}"
              echo "TEST_FEED_ZOO=${{ secrets.TEST_FEED_ZOO }}"
              echo "HEALTH_CHECK_KEY=${{ secrets.HEALTH_CHECK_KEY }}"
              echo "TEST_ENCLOSURE_ID=${{ secrets.TEST_ENCLOSURE_ID }}"
              echo "TEST_SPECIES_ID=${{ secrets.TEST_SPECIES_ID }}"
              echo "TEST_ENRICHMENT_TEXT_ID=${{ secrets.TEST_ENRICHMENT_TEXT_ID }}"
            } > tests/.env
          fi

      - name: Run safe API smoke tests
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
        run: |
          if [ -z "$TEST_BASE_URL" ]; then
            echo "Skipping live API tests because TEST_BASE_URL is not configured."
            exit 0
          fi
          pytest tests/ -v \
            -m "not slow and not write and not feedback and not requires_data and not media and not jwt" \
            --tb=short \
            --junit-xml=test-results.xml \
            --base-url="$TEST_BASE_URL"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
